provider_name: FineRes
api_key_env: LLM_API_KEY
base_url: https://it-ai.fineres.com/v1
chat_completions_path: /chat/completions
model: gpt-5.5
timeout_seconds: 300
allowed_params:
  - max_tokens
  - max_completion_tokens
  - temperature
  - top_p
  - n
  - stream
  - stream_options
  - stop
  - presence_penalty
  - frequency_penalty
  - logit_bias
  - tools
  - tool_choice
  - response_format
  - seed
  - reasoning_effort
  - modalities
  - audio
parameters:
  max_tokens: 6000
  temperature: 0.2
  reasoning_effort : medium

provider_name: OpenOX
api_key_env: LLM_API_KEY
base_url: https://api.openox.tech/v1
chat_completions_path: /chat/completions
model: gpt-5.6-sol
timeout_seconds: 300
allowed_params:
  - max_tokens
  - temperature
  - reasoning_effort
parameters:
  max_tokens: 6000
  temperature: 0.2
  reasoning_effort: medium

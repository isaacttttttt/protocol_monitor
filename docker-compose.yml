services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spm
      POSTGRES_USER: spm
      POSTGRES_PASSWORD: spm_password
    ports:
      - "5432:5432"
    volumes:
      - spm-postgres-data:/var/lib/postgresql/data

  spm-app:
    build: .
    depends_on:
      - postgres
    environment:
      APP_ENV: docker
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://spm:spm_password@postgres:5432/spm
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      BINANCE_WS_BASE: ${BINANCE_WS_BASE:-wss://fstream.binance.com/ws}
      BINANCE_REST_BASE: ${BINANCE_REST_BASE:-https://fapi.binance.com}
      LLM_PROVIDER_NAME: ${LLM_PROVIDER_NAME:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://it-ai.fineres.com/v1}
      LLM_CHAT_COMPLETIONS_URL: ${LLM_CHAT_COMPLETIONS_URL:-}
      LLM_CHAT_COMPLETIONS_PATH: ${LLM_CHAT_COMPLETIONS_PATH:-/chat/completions}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.5}
      LLM_THINKING: ${LLM_THINKING:-}
      LLM_REASONING_EFFORT: ${LLM_REASONING_EFFORT:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-6000}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-300}
    volumes:
      - ./configs:/app/configs:ro
    command: ["python", "-m", "app.main"]

volumes:
  spm-postgres-data:
